services:
  # ── Ollama (CPU by default — use docker-compose.gpu.yml for NVIDIA) ──
  ollama:
    image: ollama/ollama:latest
    ports:
      - "6970:6970"
    environment:
      - OLLAMA_HOST=0.0.0.0:6970
    volumes:
      - ${HOME:-.}/.ollama/models:/root/.ollama/models
    healthcheck:
      test: ["CMD-SHELL", "echo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── LocalStack (S3) ──
  localstack:
    image: localstack/localstack:4.0
    ports:
      - "6971:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "echo"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Postgres 17 ──
  temporal-db:
    image: postgres:17-alpine
    ports:
      - "6972:6972"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      PGPORT: 6972
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -p 6972"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Temporal Server ──
  temporal:
    image: temporalio/auto-setup:1.25.2
    ports:
      - "6973:6973"
    environment:
      - DB=postgres12
      - DB_PORT=6972
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TEMPORAL_ADDRESS=temporal:6973
      - TEMPORAL_CLI_ADDRESS=temporal:6973
      - FRONTEND_GRPC_PORT=6973
    depends_on:
      temporal-db:
        condition: service_healthy
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:6973", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  # ── Temporal UI ──
  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "6974:6974"
    environment:
      - TEMPORAL_ADDRESS=temporal:6973
      - TEMPORAL_UI_PORT=6974
      - TEMPORAL_CORS_ORIGINS=http://host.docker.internal:6974
    depends_on:
      temporal:
        condition: service_healthy

  # ── ChromaDB ──
  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "6975:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD-SHELL", "echo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Worker ──
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:6973
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:6970
      - EMBED_MODEL=nomic-embed-text
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=lcq-documents
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - BACKEND_URL=http://backend:6976
    restart: unless-stopped

  # ── Backend ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "6976:6976"
    depends_on:
      temporal:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      localstack:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - PORT=6976
      - TEMPORAL_ADDRESS=temporal:6973
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:6970
      - EMBED_MODEL=nomic-embed-text
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=lcq-documents
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD-SHELL", "echo"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Frontend ──
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "6977:6977"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  localstack_data:
  temporal_pgdata:
  chroma_data: