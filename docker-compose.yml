services:
  # ── Postgres 17 for Temporal persistence ──
  temporal-db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Temporal Server (auto-setup with Postgres) ──
  temporal:
    image: temporalio/auto-setup:1.25.2
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      temporal-db:
        condition: service_healthy
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  # ── Temporal Web UI ──
  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      temporal:
        condition: service_healthy

  # ── ChromaDB vector store ──
  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Temporal Worker (runs upload/embed activities) ──
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      temporal:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - UPLOAD_DIR=/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - upload_data:/app/uploads
    restart: unless-stopped

  # ── FastAPI Backend ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8200:8200"
    depends_on:
      temporal:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - UPLOAD_DIR=/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - upload_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Nginx Frontend ──
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "8300:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  temporal_pgdata:
  chroma_data:
  upload_data:
